version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: smart_docs_postgres
    environment:
      POSTGRES_USER: smartdocs_user
      POSTGRES_PASSWORD: smartdocs_password
      POSTGRES_DB: smartdocs_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartdocs_user -d smartdocs_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: smart_docs_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data: